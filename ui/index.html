// ══════════════════════════════════════════════════════════════════════
// KOKULI · THE INVESTIGATION — Pehverse world engine
// Self-contained. The engine architecture (state shape, render pipeline,
// function names) mirrors Pehlichi's world shell so the engine can be
// synced across repos later. This is a COORDINATION UI — no benchmark/scoring
// logic. Workspace panels show placeholder content for now.
// ══════════════════════════════════════════════════════════════════════

// ── TAB_CONFIG — Kokuli-specific. No benchmark lanes. These tabs label
//    the investigation areas and back the placeholder "open related console"
//    affordance. Kept as a map so the engine's relatedTab lookups work. ──
const TAB_CONFIG={
  overview:    {key:'overview',    label:'Case Overview',   laneTitle:'Overview'},
  fractures:   {key:'fractures',   label:'Fracture Analysis', laneTitle:'Fractures'},
  pressure:    {key:'pressure',    label:'Pressure Tests',  laneTitle:'Pressure'},
  evidence:    {key:'evidence',    label:'Evidence',        laneTitle:'Evidence'},
  monitoring:  {key:'monitoring',  label:'Live Monitoring', laneTitle:'Monitoring'}
};

// ── Small helpers (mirrors the shared engine utilities) ────────────────
const esc=(v)=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
function safeStr(value){const s=String(value??'');return(s==='undefined'||s==='null'||s==='NaN')?'':s}
function humanizeToken(text){const raw=String(text||'').replace(/[_-]+/g,' ').replace(/\s+/g,' ').trim();if(!raw)return'General';return raw.replace(/\b\w/g,(m)=>m.toUpperCase())}

// ── State — same shape as Pehlichi's, scoped to the single live product. ────
const state={
  activeTab:'overview',
  // Exactly ONE product is live per runtime (product isolation): `product`
  // is the active product id (finalized by pehInitProduct()); `scene` is an
  // area inside it; `workspaces` is the open-panel stack (last = focus).
  pehverse:{
    product:'kokuli',
    scene:localStorage.getItem('pehverse-scene')||null,
    mode:localStorage.getItem('pehverse-mode')||'immersive',
    workspaces:[],   // [{uid, defId, dock:'right'|'bottom'|'fullscreen', min}]
    focus:null,      // uid of focused workspace (top of stack)
    fastTravel:false,
    wsSeq:0,
    // Peh-as-guide: when a hotspot is clicked Peh "speaks" — a contextual
    // speech bubble appears at the hotspot and the medallion glides there.
    pehBubble:null,  // {text, x, y, anchor, variant, hotspotId, phase}
    pehPosition:null // {x, y} — current Peh medallion position (for the glide)
  }
};

// ── ProductRegistry ─────────────────────────────────────────────────────
// One public product: Kokuli — The Investigation. The adversarial fracture
// engine of the Pehverse. accent/accent2 set --peh-accent/--peh-accent2
// inline; the noir detective textures live in the .peh-product-kokuli skin.
const PRODUCT_REGISTRY=[
  {id:'kokuli', displayName:'The Investigation', tagline:'Every flaw leaves a trail',
   status:'public', order:4, accent:'#2563eb', accent2:'#b45309',
   peh:'magnifier', defaultScene:'front-office',
   // Kokuli's mascot art — Peh as private eye. Rendered by
   // renderPehGuide() as his in-world guide figure.
   mascotArt:'assets/peh-kokuli.png',
   blurb:'Kokuli hunts down every flaw — adversarial pressure until cracks show.'}
];

const PEH_DEFAULT_PRODUCT='kokuli';

// ── SceneRegistry ──────────────────────────────────────────────────────

// inside that product: id, title, desc, peh variant, pehSlot{x,y,anchor,
// variant}, and hotspots (% positioned). A hotspot may open one of THIS
// product's workspaces, travel to a sibling scene, or both. `front-office`
// is the hub map: its hotspots reach every location.
const SCENE_REGISTRY={

      {id:'fo-evidence',   label:'Evidence Locker',     x:18, y:66, scene:'evidence-locker',      greeting:"The Evidence Locker — every crack we've found, filed and dated."},
      {id:'fo-stakeout',   label:'Stakeout Van',        x:82, y:62, scene:'stakeout-van',          greeting:"The Stakeout Van — eyes on the system 24/7."},
      {id:'fo-caseboard',  label:'Case Board',          x:50, y:80, scene:'case-board',            greeting:"The Case Board. Every fracture connected — red string and all."}
    ]},
    {id:'dark-room', title:'The Dark Room', purpose:'Evidence analysis', route:'/dark-room',
     desc:'Where the evidence gets developed. Under red light, every detail shows.', peh:'beaker',
     pehSlot:{x:50, y:60, anchor:'center', variant:'analyst'}, hotspots:[
      {id:'dr-analysis', label:'Analysis Workspace',    x:44, y:50, workspace:'darkroom-analysis', greeting:"Let's develop this evidence together — under red light, every flaw shows up clear as day."},
      {id:'dr-hub',      label:'Back to Front Office',  x:82, y:78, scene:'front-office',           greeting:"Back to the office — follow me!"}
    ]},
    {id:'interrogation', title:'The Interrogation Room', purpose:'Pressure testing', route:'/interrogation',
     desc:'Hard questions, no mercy. Every model faces the hot seat.', peh:'signal',
     pehSlot:{x:50, y:58, anchor:'center', variant:'interrogator'}, hotspots:[
      {id:'ir-pressure', label:'Pressure Testing',      x:46, y:50, workspace:'interrogation-pressure', greeting:"Time for the hot seat. Hard questions, no mercy — let's see what cracks."},
      {id:'ir-hub',      label:'Back to Front Office',  x:82, y:78, scene:'front-office',               greeting:"Back to the office — follow me!"}
    ]},
    {id:'evidence-locker', title:'The Evidence Locker', purpose:'Flaw catalogue', route:'/evidence-locker',
     desc:'Every flaw, catalogued and filed. Nothing gets destroyed, nothing gets forgotten.', peh:'book',
     pehSlot:{x:48, y:58, anchor:'center', variant:'archivist'}, hotspots:[
      {id:'el-evidence', label:'Evidence & Receipts',    x:46, y:50, workspace:'locker-evidence',    greeting:"Every crack we've found, filed and dated — the evidence never lies."},
      {id:'el-hub',      label:'Back to Front Office',   x:82, y:78, scene:'front-office',             greeting:"Back to the office — follow me!"}
    ]},
    {id:'stakeout-van', title:'The Stakeout Van', purpose:'Live monitoring', route:'/stakeout-van',
     desc:'Outside, watching, waiting. Live monitoring of what the system does when nobody\'s looking.', peh:'gear',
     pehSlot:{x:52, y:58, anchor:'center', variant:'lookout'}, hotspots:[
      {id:'sv-monitor', label:'Live Monitoring',         x:46, y:50, workspace:'stakeout-monitoring', greeting:"Eyes on the system 24/7 — what it does when nobody's watching tells the real story."},
      {id:'sv-hub',     label:'Back to Front Office',    x:82, y:78, scene:'front-office',              greeting:"Back to the office — follow me!"}
    ]},
    {id:'case-board', title:'The Case Board', purpose:'Fracture map', route:'/case-board',
     desc:'Red string, pinned photos, connected dots. The full picture of every fracture.', peh:'star',
     pehSlot:{x:50, y:60, anchor:'center', variant:'profiler'}, hotspots:[
      {id:'cb-fractures', label:'Fracture Map',           x:46, y:50, workspace:'caseboard-fractures', greeting:"See the pattern? Red string connects every fracture — the full picture."},
      {id:'cb-hub',       label:'Back to Front Office',   x:82, y:78, scene:'front-office',              greeting:"Back to the office — follow me!"}

// ── WorkspaceManager: definitions ──────────────────────────────────────
// A WorkspaceDeclaration declares how a hotspot's panel behaves. `product`
// is the OWNING product id — the isolation boundary. kind:'deck' is the
// Front Office overview console; kind:'placeholder' is a "coming soon" stub
// that still links to its related coordination console via relatedTab.
const WORKSPACE_REGISTRY={
  'console':                  {product:'kokuli', title:'Case Overview',       kind:'deck',        route:'/front-office',     dock:'fullscreen', peh:'magnifier'},
  'darkroom-analysis':        {product:'kokuli', title:'Analysis',            kind:'placeholder', route:'/dark-room',         dock:'right', peh:'beaker',   relatedTab:'fractures',  blurb:'Fracture analysis panel coming soon — evidence development and flaw identification will live here.'},
  'interrogation-pressure':   {product:'kokuli', title:'Pressure Testing',    kind:'placeholder', route:'/interrogation',     dock:'right', peh:'signal',   relatedTab:'pressure',   blurb:'Pressure testing panel coming soon — adversarial probes and model stress tests will live here.'},
  'locker-evidence':          {product:'kokuli', title:'Evidence & Receipts', kind:'placeholder', route:'/evidence-locker',   dock:'right', peh:'book',     relatedTab:'evidence',   blurb:'Evidence panel coming soon — flaw catalogue, receipts, and crack history will live here.'},
  'stakeout-monitoring':      {product:'kokuli', title:'Live Monitoring',     kind:'placeholder', route:'/stakeout-van',      dock:'right', peh:'gear',     relatedTab:'monitoring', blurb:'Live monitoring panel coming soon — real-time system watch and anomaly detection will live here.'},
  'caseboard-fractures':      {product:'kokuli', title:'Fracture Map',        kind:'placeholder', route:'/case-board',        dock:'bottom', peh:'star',    relatedTab:'fractures',  blurb:'Fracture map panel coming soon — connected dots, red string, and the full picture of every flaw.'}
};

// ── Registry lookups ───────────────────────────────────────────────────
function pehProduct(id){return PRODUCT_REGISTRY.find((p)=>p.id===id)||null}
function pehPublicProducts(){return PRODUCT_REGISTRY.filter((p)=>p.status==='public').sort((a,b)=>a.order-b.order)}
function pehFutureProducts(){return PRODUCT_REGISTRY.filter((p)=>p.status==='future').sort((a,b)=>a.order-b.order)}
function pehScenes(productId){return SCENE_REGISTRY[productId]||[]}
function pehScene(productId,sceneId){return pehScenes(productId).find((s)=>s.id===sceneId)||null}
function pehWorkspaceDef(defId){return WORKSPACE_REGISTRY[defId]||null}

// ── Product isolation: dev mode + active-product resolution ────────────
function pehDevMode(){
  try{
    if(typeof window!=='undefined'&&window.PEHVERSE_DEV===true)return true;
    if(typeof location!=='undefined'&&/[?&]peh-dev=1(?:&|$)/.test(location.search||'')){
      try{localStorage.setItem('pehverse-dev','1')}catch(e){}
    }
    return (typeof localStorage!=='undefined'&&localStorage.getItem('pehverse-dev')==='1');
  }catch(e){return false}
}
function pehResolveActiveProduct(){
  let injected=null,devSel=null;
  try{injected=(typeof window!=='undefined'&&window.PEHVERSE_PRODUCT)||null}catch(e){}
  try{devSel=pehDevMode()?localStorage.getItem('pehverse-product'):null}catch(e){}
  const want=injected||devSel||PEH_DEFAULT_PRODUCT;
  const p=pehProduct(want);
  return (p&&p.status==='public')?p.id:PEH_DEFAULT_PRODUCT;
}
function pehActiveProduct(){
  const p=pehProduct(state.pehverse.product);
  return (p&&p.status==='public')?p:pehProduct(PEH_DEFAULT_PRODUCT);
}
function pehActiveProductId(){const p=pehActiveProduct();return p?p.id:PEH_DEFAULT_PRODUCT}
function pehCurrentScene(){
  const p=pehActiveProduct(); if(!p)return null;
  const sid=state.pehverse.scene||p.defaultScene;
  return pehScene(p.id,sid)||pehScenes(p.id)[0]||null;
}
function pehInitProduct(){
  const pid=pehResolveActiveProduct();
  state.pehverse.product=pid;
  const prod=pehProduct(pid);
  if(!state.pehverse.scene||!pehScene(pid,state.pehverse.scene)){
    state.pehverse.scene=(prod&&prod.defaultScene)||(pehScenes(pid)[0]&&pehScenes(pid)[0].id)||null;
  }
}
function pehWorkspaceBelongsToActive(def){
  if(!def)return false;
  return def.product==null||def.product===pehActiveProductId();
}

// ── Navigation (product-local scene travel + mode) ─────────────────────
function pehSetScene(sceneId){
  if(!pehScene(pehActiveProductId(),sceneId))return; // isolation: own areas only
  state.pehverse.scene=sceneId;
  state.pehverse.pehPosition=null; // new scene → Peh rests at its own slot
  localStorage.setItem('pehverse-scene',sceneId);
  render();
}
function pehGoScene(sceneId){
  if(!pehScene(pehActiveProductId(),sceneId))return;
  state.pehverse.scene=sceneId;
  state.pehverse.pehPosition=null;
  state.pehverse.fastTravel=false;
  localStorage.setItem('pehverse-scene',sceneId);
  render();
}
function pehDevSwitchProduct(productId){
  if(!pehDevMode())return;
  const p=pehProduct(productId);
  if(!p||p.status!=='public')return;
  state.pehverse.product=p.id;
  state.pehverse.scene=p.defaultScene||(pehScenes(p.id)[0]&&pehScenes(p.id)[0].id)||null;
  state.pehverse.workspaces=[];
  state.pehverse.focus=null;
  state.pehverse.pehBubble=null;
  state.pehverse.pehPosition=null;
  state.pehverse.fastTravel=false;
  try{localStorage.setItem('pehverse-product',p.id);if(state.pehverse.scene)localStorage.setItem('pehverse-scene',state.pehverse.scene)}catch(e){}
  render();
}
function pehSetMode(mode){
  if(mode!=='immersive'&&mode!=='dashboard')return;
  state.pehverse.mode=mode;
  localStorage.setItem('pehverse-mode',mode);
  render();
}
function pehToggleMode(){pehSetMode(state.pehverse.mode==='immersive'?'dashboard':'immersive')}
function pehToggleFastTravel(force){
  state.pehverse.fastTravel=(typeof force==='boolean')?force:!state.pehverse.fastTravel;
  render();
}

// ── WorkspaceManager: open/close/dock/focus/minimize ───────────────────
function pehOpenWorkspace(defId,opts){
  const def=pehWorkspaceDef(defId); if(!def)return;
  if(!pehWorkspaceBelongsToActive(def)){
    if(typeof console!=='undefined'&&console.warn){
      console.warn('[pehverse] blocked cross-product workspace open:',defId,'(owned by',def.product,'· active',pehActiveProductId()+')');
    }
    return;
  }
  let ws=state.pehverse.workspaces.find((w)=>w.defId===defId); // de-dupe
  if(!ws){
    ws={uid:'ws'+(++state.pehverse.wsSeq),defId,dock:(opts&&opts.dock)||def.dock||'right',min:false};
    state.pehverse.workspaces.push(ws);
  }
  ws.min=false;
  pehFocusWorkspace(ws.uid,true);
  render();
}

// ── Peh-as-guide: contextual speech bubble ─────────────────────────────
// When a hotspot is clicked, Peh "appears" there with a greeting. The
// bubble auto-dismisses after a few seconds (fade), and the medallion
// glides to the hotspot (renderPehSlot reads pehPosition).
let pehBubbleFadeTimer=null;  // fires the exit (fade-out) phase
let pehBubbleClearTimer=null; // removes the bubble after the fade
const PEH_BUBBLE_HOLD_MS=6000; // visible before fade begins
const PEH_BUBBLE_FADE_MS=300;  // fade-out duration (matches CSS .peh-bubble-exit)
function pehClearBubbleTimers(){
  if(pehBubbleFadeTimer){clearTimeout(pehBubbleFadeTimer);pehBubbleFadeTimer=null;}
  if(pehBubbleClearTimer){clearTimeout(pehBubbleClearTimer);pehBubbleClearTimer=null;}
}
function pehBubbleAnchor(hotspot){return (hotspot.y!=null&&hotspot.y<24)?'down':'up';}
function pehSayGreeting(hotspot,scene){
  if(!hotspot)return;
  const text=hotspot.greeting||(scene?`Welcome to ${scene.title}.`:'This way!');
  const x=Math.max(16,Math.min(84,hotspot.x!=null?hotspot.x:50));
  const y=hotspot.y!=null?hotspot.y:50;
  pehClearBubbleTimers();
  state.pehverse.pehBubble={
    text,x,y,
    anchor:pehBubbleAnchor(hotspot),
    variant:(scene&&scene.pehSlot&&scene.pehSlot.variant)||'guide',
    hotspotId:hotspot.id,
    phase:'enter'
  };
  // Peh glides to the hotspot — use the true x (not the clamped bubble x).
  state.pehverse.pehPosition={x:hotspot.x!=null?hotspot.x:50,y};
  render();
  pehBubbleFadeTimer=setTimeout(()=>{
    pehBubbleFadeTimer=null;
    if(!state.pehverse.pehBubble||state.pehverse.pehBubble.hotspotId!==hotspot.id)return;
    state.pehverse.pehBubble.phase='exit';
    render();
    pehBubbleClearTimer=setTimeout(()=>{
      pehBubbleClearTimer=null;
      if(state.pehverse.pehBubble&&state.pehverse.pehBubble.hotspotId===hotspot.id){
        state.pehverse.pehBubble=null;
        render();
      }
    },PEH_BUBBLE_FADE_MS);
  },PEH_BUBBLE_HOLD_MS);
}
function pehDismissBubble(){
  if(!state.pehverse.pehBubble)return;
  pehClearBubbleTimers();
  state.pehverse.pehBubble.phase='exit';
  render();
  pehBubbleClearTimer=setTimeout(()=>{
    pehBubbleClearTimer=null;
    state.pehverse.pehBubble=null;
    render();
  },PEH_BUBBLE_FADE_MS);
}
function pehHotspot(defId,sceneId){
  if(sceneId&&pehScene(pehActiveProductId(),sceneId)){
    state.pehverse.scene=sceneId;state.pehverse.pehPosition=null;localStorage.setItem('pehverse-scene',sceneId);
  }
  pehOpenWorkspace(defId);
}
// Hotspot activation entry point: Peh greets FIRST, then — after a short
// beat so the bubble/medallion are seen — the navigation runs.
function pehHotspotActivate(sceneId,hotspotId){
  const scene=pehScene(pehActiveProductId(),sceneId);
  const hotspot=scene&&scene.hotspots?scene.hotspots.find((h)=>h.id===hotspotId):null;
  if(hotspot)pehSayGreeting(hotspot,scene);
  setTimeout(()=>{
    if(!hotspot)return;
    if(hotspot.workspace)pehHotspot(hotspot.workspace,hotspot.scene);
    else if(hotspot.scene)pehSetScene(hotspot.scene);
  },300);
}
function pehFocusWorkspace(uid,skipRender){
  const ws=state.pehverse.workspaces.find((w)=>w.uid===uid);
  if(!ws){if(!skipRender)render();return}
  state.pehverse.focus=uid;
  const def=pehWorkspaceDef(ws.defId);
  if(def&&def.kind==='lane'&&def.tab)state.activeTab=def.tab;
  // Move focused workspace to the end of the stack (top of z-order).
  state.pehverse.workspaces=state.pehverse.workspaces.filter((w)=>w.uid!==uid).concat(ws);
  if(!skipRender)render();
}
function pehCloseWorkspace(uid){
  state.pehverse.workspaces=state.pehverse.workspaces.filter((w)=>w.uid!==uid);
  if(state.pehverse.focus===uid){
    const stack=state.pehverse.workspaces;
    state.pehverse.focus=stack.length?stack[stack.length-1].uid:null;
  }
  render();
}
function pehDockWorkspace(uid,dock){
  const ws=state.pehverse.workspaces.find((w)=>w.uid===uid); if(!ws)return;
  ws.dock=dock; ws.min=false; pehFocusWorkspace(uid,true); render();
}
function pehMinimizeWorkspace(uid){
  const ws=state.pehverse.workspaces.find((w)=>w.uid===uid); if(!ws)return;
  ws.min=!ws.min; render();
}
function pehCloseAllWorkspaces(){
  state.pehverse.workspaces=[]; state.pehverse.focus=null; render();
}
function pehBackToMap(uid){
  if(uid)state.pehverse.workspaces=state.pehverse.workspaces.filter((w)=>w.uid!==uid);
  const stack=state.pehverse.workspaces;
  state.pehverse.focus=stack.length?stack[stack.length-1].uid:null;
  state.pehverse.mode='immersive';
  try{localStorage.setItem('pehverse-mode','immersive')}catch(e){}
  render();
}
function pehOpenRelatedLane(tab){if(tab)state.activeTab=tab;pehOpenWorkspace('console')}

// ── Peh placeholder slot (data-driven squirrel guide medallion) ────────
// Each location carries a `pehSlot:{x,y,anchor,variant}`. Peh visits as a
// detective-squirrel guide; the medallion is a SILHOUETTE placeholder,
// swapped for real per-location Peh art later.
function pehSquirrelSilhouette(){
  return `<svg class="peh-squirrel" viewBox="0 0 64 64" width="100%" height="100%" aria-hidden="true"><path fill="currentColor" d="M40 9c2.2 0 4 2 4 4.6 0 2-1 3.6-2.4 4.4 3 2.4 4.8 6 4.8 10.2 0 3-1 5.7-2.7 7.9 5.7 2.5 9.7 8.1 9.7 14.6 0 1.7-1.3 3-3 3H22c-7.2 0-13-5.8-13-13 0-6.8 5.2-12.4 11.9-13 .3-4 2.3-7.5 5.3-9.8-.7-1-1.1-2.2-1.1-3.5C25 11 28 8 31.8 8c1.9 0 3.6.8 4.8 2 1-1.2 2.4-1 3.4-1z"/><g fill="none" stroke="#1a2040" stroke-width="1.6" stroke-linecap="round" opacity=".92"><circle cx="29.5" cy="23.5" r="3.7"/><path d="M33 22.4c3-1 5.2-.9 7 .5"/></g><circle cx="29.5" cy="23.5" r="1.4" fill="#080c18"/></svg>`;
}
function pehSlotMarkup(slot,opts){
  if(!slot)return'';
  const o=opts||{};
  const variant=slot.variant||'guide';
  const inline=o.inline; // dashboard/mobile card → static medallion, no % position
  const pos=inline?'' : `left:${slot.x}%;top:${slot.y}%;`;
  const anchor=slot.anchor||'center';
  return `<div class="peh-slot peh-slot-${anchor} ${inline?'peh-slot-inline':''} ${o.glow?'glow':''}" style="${pos}" data-variant="${esc(variant)}" data-anchor="${esc(anchor)}" title="Peh — your guide here (${esc(variant)})" aria-label="Peh placeholder — ${esc(variant)}">
    <span class="peh-slot-medallion" aria-hidden="true">${pehSquirrelSilhouette()}</span>
    ${inline?'':'<span class="peh-slot-tag">Peh</span>'}
  </div>`;
}
function renderPehSlot(scene){
  if(!scene||!scene.pehSlot)return'';
  const pv=state.pehverse;
  const slot=pv.pehPosition
    ? Object.assign({},scene.pehSlot,{x:pv.pehPosition.x,y:pv.pehPosition.y})
    : scene.pehSlot;
  return pehSlotMarkup(slot,{inline:false,glow:!!pv.pehBubble});
}
// Peh's contextual speech bubble — anchored at the clicked hotspot. The
// scene overlay layer is click-through (pointer-events:none in CSS); only
// the bubble itself is interactive.
function renderPehBubble(){
  const b=state.pehverse.pehBubble;
  if(!b)return'';
  const phaseClass=b.phase==='exit'?'peh-bubble-exit':'peh-bubble-enter';
  return `<div class="peh-bubble-layer" aria-hidden="false">
    <div class="peh-bubble peh-bubble-anchor-${esc(b.anchor)} ${phaseClass}" style="left:${b.x}%;top:${b.y}%" role="status" title="Dismiss" onclick="pehDismissBubble()">
      <div class="peh-bubble-content">
        <span class="peh-bubble-name">Kokuli</span>
        <p class="peh-bubble-text">${esc(b.text)}</p>
      </div>
      <div class="peh-bubble-tail" aria-hidden="true"></div>
    </div>
  </div>`;
}
// Peh guide figure — the product's real mascot art (Kokuli's private-eye
// portrait), framed as a "your guide" portrait. Renders ONLY when the active
// product ships mascotArt. Decorative (aria-hidden).
function renderPehGuide(product){
  if(!product||!product.mascotArt)return'';
  return `<figure class="peh-guide" aria-hidden="true">
    <span class="peh-guide-frame"><img class="peh-guide-img" src="${esc(product.mascotArt)}" alt="" loading="lazy"></span>
    <figcaption class="peh-guide-cap"><b>Kokuli</b><i>your guide</i></figcaption>
  </figure>`;
}

// ── PehverseShell: top-level renderer (called by render()) ─────────────
function renderPehverse(deckMarkup){
  const pv=state.pehverse;
  const product=pehActiveProduct();
  const scene=pehCurrentScene();
  const styleVars=`--peh-accent:${product.accent};--peh-accent2:${product.accent2||product.accent}`;
  return `<div class="peh-shell peh-mode-${pv.mode} peh-product-${product.id}" data-product="${product.id}" style="${styleVars}">
    ${renderPehTopBar(product,scene)}
    <div class="peh-stage">${renderPehStage(product,scene,deckMarkup)}</div>
    ${renderPehTaskbar()}
    ${renderFastTravelMenu()}
  </div>`;
}

function renderPehTopBar(product,scene){
  const pv=state.pehverse;
  const dev=pehDevMode();
  return `<header class="peh-topbar">
    <div class="peh-brand"><span class="peh-brand-mark" title="Pehverse ecosystem">PEH</span><span class="peh-brand-word">${esc(product.displayName)}</span>${dev?'<span class="peh-dev-badge" title="Dev mode — product switcher enabled (hidden in release)">DEV</span>':''}</div>
    <button class="peh-travel-btn" type="button" onclick="pehToggleFastTravel()" aria-haspopup="dialog" aria-expanded="${pv.fastTravel?'true':'false'}" title="Fast travel — areas in ${esc(product.displayName)} (Alt+T)">
      <span class="peh-travel-glyph" aria-hidden="true">✦</span>
      <span class="peh-here"><b>${esc(product.displayName)}</b><i>${esc(scene?scene.title:product.tagline)}</i></span>
      <span class="peh-travel-cta">Fast travel</span>
    </button>
    <div class="peh-mode-toggle" role="group" aria-label="View mode (Alt+M to toggle)">
      <button type="button" class="${pv.mode==='immersive'?'active':''}" aria-pressed="${pv.mode==='immersive'}" onclick="pehSetMode('immersive')">Immersive</button>
      <button type="button" class="${pv.mode==='dashboard'?'active':''}" aria-pressed="${pv.mode==='dashboard'}" onclick="pehSetMode('dashboard')">Dashboard</button>
    </div>
  </header>`;
}

function renderPehStage(product,scene,deckMarkup){
  return state.pehverse.mode==='dashboard'
    ? renderPehDashboard(product,scene,deckMarkup)
    : renderPehImmersive(product,scene,deckMarkup);
}

// Immersive: scene-first. Background atmosphere + caption + hotspots, with
// open workspaces docking over the scene (or as mobile bottom sheets).
function renderPehImmersive(product,scene,deckMarkup){
  return `<div class="peh-scene" data-scene="${scene?scene.id:''}">
    <div class="peh-scene-atmos" aria-hidden="true"></div>
    <div class="peh-scene-caption">
      <span class="peh-scene-tag">${esc(product.displayName)} · ${esc(product.tagline)}</span>
      <h1 class="peh-scene-title">${esc(scene?scene.title:product.displayName)}</h1>
      <p class="peh-scene-desc">${esc(scene?scene.desc:product.blurb)}</p>
    </div>
    ${renderPehSlot(scene)}
    ${renderPehBubble()}
    ${renderPehGuide(product)}
    ${renderHotspotLayer(scene)}
    ${renderPehWaypoints(product,scene)}
    ${renderWorkspaceOverlays(deckMarkup)}
  </div>`;
}

// Dashboard: workspace-first. Thin scene strip on top, open workspaces tile
// in a grid. When nothing is open, show a chooser of THIS product's spaces.
function renderPehDashboard(product,scene,deckMarkup){
  const open=state.pehverse.workspaces;
  const grid=open.length
    ? open.map((w)=>renderWorkspaceTile(w,deckMarkup)).join('')
    : pehWorkspaceChooser(product);
  return `<div class="peh-dash">
    <div class="peh-dash-head">
      <div class="peh-dash-here">${scene&&scene.pehSlot?pehSlotMarkup(scene.pehSlot,{inline:true}):''}<span class="peh-scene-tag">${esc(product.displayName)}</span><h1>${esc(scene?scene.title:product.displayName)}</h1><p>${esc(scene?scene.desc:product.blurb)}</p></div>
      ${renderPehWaypoints(product,scene)}
    </div>
    <div class="peh-grid ${open.length>1?'multi':''}">${grid}</div>
  </div>`;
}

// ── HotspotLayer ───────────────────────────────────────────────────────
function renderHotspotLayer(scene){
  if(!scene||!scene.hotspots||!scene.hotspots.length)return'';
  return `<div class="peh-hotspots" aria-label="${esc(scene.title)} hotspots">${scene.hotspots.map((h)=>{
    const action=`pehHotspotActivate('${scene.id}','${h.id}')`;
    const kind=h.workspace?(pehWorkspaceDef(h.workspace)||{}).kind:'travel';
    return `<button class="peh-hotspot" type="button" style="left:${h.x}%;top:${h.y}%" title="${esc(h.label)}" aria-label="${esc(h.label)}" onclick="${action}">
      <span class="peh-pin" aria-hidden="true"></span>
      <span class="peh-hotspot-label">${esc(h.label)}${kind==='deck'?'<i class="peh-dot-live"></i>':''}</span>
    </button>`;
  }).join('')}</div>`;
}

// Scene-to-scene waypoints — fast hops between the active product's own areas.
function renderPehWaypoints(product,scene){
  const scenes=pehScenes(product.id);
  if(scenes.length<2)return'';
  return `<nav class="peh-waypoints" aria-label="${esc(product.displayName)} areas">${scenes.map((s)=>`<button type="button" class="peh-waypoint ${scene&&s.id===scene.id?'active':''}" aria-current="${scene&&s.id===scene.id?'true':'false'}" onclick="pehSetScene('${s.id}')">${esc(s.title)}</button>`).join('')}</nav>`;
}

// ── WorkspaceManager: panel + tile + body renderers ────────────────────
function renderWorkspaceOverlays(deckMarkup){
  const open=state.pehverse.workspaces;
  if(!open.length)return'';
  let ws=open.find((w)=>w.uid===state.pehverse.focus)||open[open.length-1];
  if(ws.min)return''; // minimized → scene unobstructed; chip stays in taskbar
  return `<div class="peh-overlays">${renderWorkspacePanel(ws,deckMarkup)}</div>`;
}
function renderWorkspacePanel(w,deckMarkup){
  const def=pehWorkspaceDef(w.defId)||{};
  const focused=state.pehverse.focus===w.uid;
  return `<section class="peh-panel dock-${w.dock} ${focused?'focused':''} ${w.min?'min':''}" data-uid="${w.uid}" onmousedown="pehFocusWorkspace('${w.uid}')" aria-label="${esc(def.title||w.defId)} workspace">
    ${renderWorkspaceHeader(w,def,false)}
    <div class="peh-panel-body">${w.min?'':pehWorkspaceBody(w,deckMarkup)}</div>
  </section>`;
}
function renderWorkspaceTile(w,deckMarkup){
  const def=pehWorkspaceDef(w.defId)||{};
  return `<section class="peh-tile ${state.pehverse.focus===w.uid?'focused':''}" data-uid="${w.uid}" onmousedown="pehFocusWorkspace('${w.uid}')" aria-label="${esc(def.title||w.defId)} workspace">
    ${renderWorkspaceHeader(w,def,true)}
    <div class="peh-panel-body">${pehWorkspaceBody(w,deckMarkup)}</div>
  </section>`;
}
function renderWorkspaceHeader(w,def,isTile){
  const kindTag=def.kind==='lane'?'LIVE':def.kind==='deck'?'CONSOLE':'PLACEHOLDER';
  const dockBtn=(d,glyph,label)=>`<button class="peh-dockbtn ${w.dock===d?'on':''}" type="button" title="Dock ${label}" aria-label="Dock ${label}" onclick="event.stopPropagation();pehDockWorkspace('${w.uid}','${d}')">${glyph}</button>`;
  return `<header class="peh-panel-head">
    ${isTile?'':`<button class="peh-backmap" type="button" title="Back to the map" aria-label="Back to the world map" onclick="event.stopPropagation();pehBackToMap('${w.uid}')"><span aria-hidden="true">‹</span> Map</button>`}
    <span class="peh-panel-glyph">${pehGlyph(def.peh)}</span>
    <span class="peh-panel-title">${esc(def.title||w.defId)}</span>
    <span class="peh-panel-kind k-${kindTag.toLowerCase()}">${kindTag}</span>
    <span class="peh-panel-ctrls">
      ${isTile?'':dockBtn('right','⫼','right')+dockBtn('bottom','▭','bottom')+dockBtn('fullscreen','⛶','full')}
      <button class="peh-dockbtn" type="button" title="Minimize" aria-label="Minimize" onclick="event.stopPropagation();pehMinimizeWorkspace('${w.uid}')">—</button>
      <button class="peh-dockbtn close" type="button" title="Close" aria-label="Close" onclick="event.stopPropagation();pehCloseWorkspace('${w.uid}')">×</button>
    </span>
  </header>`;
}
function pehWorkspaceBody(w,deckMarkup){
  const def=pehWorkspaceDef(w.defId); if(!def)return'';
  if(def.kind==='deck')return `<div class="peh-deck-wrap">${deckMarkup}</div>`;
  // No benchmark lanes in Kokuli — every non-deck workspace is an
  // atmospheric placeholder that links to its investigation console.
  return pehPlaceholderBody(def);
}
function pehPlaceholderBody(def){
  return `<div class="peh-ph">
    <div class="peh-ph-glyph">${pehGlyph(def.peh)}</div>
    <p class="peh-ph-blurb">${esc(def.blurb||'Workspace placeholder.')}</p>
    ${def.relatedTab?`<button class="button secondary" type="button" onclick="pehOpenRelatedLane('${def.relatedTab}')">Open ${esc(TAB_CONFIG[def.relatedTab]?TAB_CONFIG[def.relatedTab].label:def.relatedTab)} overview</button>`:''}
    <div class="peh-ph-tag">PLACEHOLDER · coming soon</div>
  </div>`;
}

function pehProductWorkspaces(productId){
  return Object.keys(WORKSPACE_REGISTRY).filter((id)=>{
    const d=WORKSPACE_REGISTRY[id];
    return d.product===productId||d.product==null;
  });
}
function pehWorkspaceChooser(product){
  const defs=pehProductWorkspaces(product.id);
  return `<div class="peh-chooser">${defs.map((id)=>{
    const d=WORKSPACE_REGISTRY[id];
    return `<button class="peh-choice" type="button" onclick="pehOpenWorkspace('${id}')">
      <span class="peh-choice-glyph">${pehGlyph(d.peh)}</span>
      <span class="peh-choice-title">${esc(d.title)}</span>
      <span class="peh-choice-kind">${d.kind==='lane'?'live lane':d.kind==='deck'?'console':'placeholder'}</span>
    </button>`;
  }).join('')}</div>`;
}

// ── Taskbar (workspace switcher; always reachable) ─────────────────────
function renderPehTaskbar(){
  const open=state.pehverse.workspaces;
  return `<div class="peh-taskbar" role="toolbar" aria-label="Open workspaces">
    <button class="peh-task-travel" type="button" onclick="pehToggleFastTravel()" title="Fast travel (Alt+T)" aria-label="Fast travel"><span aria-hidden="true">✦</span></button>
    <div class="peh-task-chips">${open.length?open.map((w)=>{
      const def=pehWorkspaceDef(w.defId)||{};
      return `<button class="peh-task-chip ${state.pehverse.focus===w.uid?'active':''} ${w.min?'min':''}" type="button" onclick="pehFocusWorkspace('${w.uid}')" title="${esc(def.title||w.defId)}"><span class="peh-task-glyph">${pehGlyph(def.peh)}</span><span class="peh-task-name">${esc(def.title||w.defId)}</span><span class="peh-task-x" role="button" tabindex="0" title="Close" aria-label="Close ${esc(def.title||w.defId)}" onclick="event.stopPropagation();pehCloseWorkspace('${w.uid}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();event.stopPropagation();pehCloseWorkspace('${w.uid}')}">×</span></button>`;
    }).join(''):`<span class="peh-task-empty">No open workspaces — tap a hotspot, or ✦ Fast travel.</span>`}</div>
    ${open.length?`<button class="peh-task-clear" type="button" onclick="pehCloseAllWorkspaces()">Close all</button>`:''}
  </div>`;
}

// ── FastTravelMenu (product-local: the active product's scenes) ────────
function renderFastTravelMenu(){
  if(!state.pehverse.fastTravel)return'';
  const product=pehActiveProduct();
  const here=pehCurrentScene();
  const scenes=pehScenes(product.id);
  return `<div class="peh-ft-overlay" role="dialog" aria-modal="true" aria-label="Fast travel" onclick="if(event.target===this)pehToggleFastTravel(false)">
    <div class="peh-ft">
      <header class="peh-ft-head"><h2>Fast travel</h2><span class="peh-ft-hint">Within ${esc(product.displayName)} · jump to any area</span><button class="peh-ft-close" type="button" onclick="pehToggleFastTravel(false)" aria-label="Close fast travel">×</button></header>
      <div class="peh-ft-scenes peh-ft-scenes-main">${scenes.length?scenes.map((s)=>`<button class="peh-ft-scene ${here&&here.id===s.id?'active':''}" aria-current="${here&&here.id===s.id?'true':'false'}" type="button" onclick="pehGoScene('${s.id}')">${esc(s.title)}</button>`).join(''):`<span class="peh-ft-empty">No additional areas in ${esc(product.displayName)} yet.</span>`}</div>
      ${pehDevMode()?renderPehDevSwitcher(product):''}
    </div>
  </div>`;
}
function renderPehDevSwitcher(active){
  const pub=pehPublicProducts();
  const future=pehFutureProducts();
  return `<div class="peh-ft-dev">
    <span class="peh-ft-dev-label">⚙ Dev only · product switcher (hidden in release)</span>
    <div class="peh-ft-dev-products">
      ${pub.map((p)=>`<button class="peh-ft-dev-product ${p.id===active.id?'active':''}" type="button" onclick="pehDevSwitchProduct('${p.id}')">${esc(p.displayName)}</button>`).join('')}
      ${future.map((p)=>`<span class="peh-ft-dev-soon" title="Config example only — not a runtime destination">${esc(p.displayName)} · config only</span>`).join('')}
    </div>
  </div>`;
}

// ── Investigation Overview console (the kind:'deck' workspace body) ──────
// Kokuli's "Case Overview" dashboard: a noir detective coordination console.
// No benchmarks — just a map of the investigation areas + known flaw types.
const KOKULI_FLAW_TYPES=['Boundary Violations','Prompt Injection','Logic Drift','Hallucination Chains','Context Window Overflow','Adversarial Repetition','Safety Bypass'];
function renderCaseOverviewConsole(){
  const cards=[
    {ws:'darkroom-analysis',      scene:'dark-room',       glyph:'beaker',  title:'Dark Room',         desc:'Evidence development — under red light, every flaw shows up clear as day.'},
    {ws:'interrogation-pressure', scene:'interrogation',    glyph:'signal',  title:'Interrogation',     desc:'Pressure testing — hard questions, no mercy. Every model faces the hot seat.'},
    {ws:'locker-evidence',        scene:'evidence-locker',  glyph:'book',    title:'Evidence Locker',   desc:'Flaw catalogue — every crack found, filed and dated. The evidence never lies.'},
    {ws:'stakeout-monitoring',    scene:'stakeout-van',     glyph:'gear',    title:'Stakeout Van',      desc:'Live monitoring — eyes on the system 24/7. What it does when nobody\'s watching.'},
    {ws:'caseboard-fractures',    scene:'case-board',       glyph:'star',    title:'Case Board',        desc:'Fracture map — red string connects every flaw. See the pattern?'}
  ];
  return `<div class="inv-console">
    <div class="inv-hero">
      <span class="inv-hero-mark" aria-hidden="true">🔍</span>
      <div>
        <h2>Welcome to the Front Office</h2>
        <p>I'm Kokuli — I hunt down every flaw until cracks show. Every case starts here: pull up a chair, pick a room, or tap the map. I've seen models tougher than this one crack under pressure.</p>
      </div>
    </div>
    <h3 class="inv-section-title">Investigation areas</h3>
    <div class="inv-cards">${cards.map((c)=>`
      <button class="inv-card" type="button" onclick="pehHotspot('${c.ws}','${c.scene}')">
        <span class="inv-card-glyph">${pehGlyph(c.glyph)}</span>
        <span class="inv-card-title">${esc(c.title)}</span>
        <span class="inv-card-desc">${esc(c.desc)}</span>
      </button>`).join('')}</div>
    <div class="inv-cases">
      <p>"Every flaw leaves a trail. You just have to know where to look."</p>
      <div class="inv-cases-row">${KOKULI_FLAW_TYPES.map((f)=>`<span class="inv-case">${esc(f)}</span>`).join('')}</div>
    </div>
    <div class="inv-foot">THE INVESTIGATION · Kokuli · adversarial fracture engine</div>
  </div>`;
}

// ── Keyboard: Esc closes overlay; Alt+T travel; Alt+M mode toggle ──────
let __pehKeysBound=false;
function pehBindKeys(){
  if(__pehKeysBound)return; __pehKeysBound=true;
  document.addEventListener('keydown',(e)=>{
    if(e.key==='Escape'&&state.pehverse.fastTravel){pehToggleFastTravel(false);return}
    if(e.altKey&&(e.key==='t'||e.key==='T')){e.preventDefault();pehToggleFastTravel()}
    if(e.altKey&&(e.key==='m'||e.key==='M')){e.preventDefault();pehToggleMode()}
  });
}
pehBindKeys();
// Finalize which single product is live before the first render.
pehInitProduct();

function render(){
  // The Pehverse world shell (renderPehverse) wraps the Investigation overview
  // console (deckMarkup), reachable as the "Case Overview" deck
  // workspace, while place-based navigation is the public default.
  const deckMarkup=renderCaseOverviewConsole();
  document.getElementById('app').innerHTML=renderPehverse(deckMarkup);
}

// Expose handlers used by inline onclick attributes (function declarations
// are already global in a classic script; these are belt-and-suspenders).
window.pehHotspotActivate=pehHotspotActivate;
window.pehDismissBubble=pehDismissBubble;
window.pehToggleFastTravel=pehToggleFastTravel;
window.pehSetMode=pehSetMode;
window.pehSetScene=pehSetScene;
window.pehGoScene=pehGoScene;
window.pehDevSwitchProduct=pehDevSwitchProduct;
window.pehOpenWorkspace=pehOpenWorkspace;
window.pehFocusWorkspace=pehFocusWorkspace;
window.pehCloseWorkspace=pehCloseWorkspace;
window.pehDockWorkspace=pehDockWorkspace;
window.pehMinimizeWorkspace=pehMinimizeWorkspace;
window.pehCloseAllWorkspaces=pehCloseAllWorkspaces;
window.pehBackToMap=pehBackToMap;
window.pehOpenRelatedLane=pehOpenRelatedLane;
window.pehHotspot=pehHotspot;

// ── Boot ────────────────────────────────────────────────────────────────
// No sign-in, no server. The UI loads directly into the Investigation.
function boot(){
  try{
    render();
  }catch(err){
    const app=document.getElementById('app');
    if(app)app.innerHTML='<div style="padding:24px;color:#e8ecf4;font-family:sans-serif">The Investigation could not finish loading. <button onclick="boot()" style="margin-left:8px">Retry</button><pre style="color:#7a88a0;white-space:pre-wrap">'+esc(String(err&&err.stack||err))+'</pre></div>';
  }
}
window.boot=boot;
boot();
</script>
</body>
